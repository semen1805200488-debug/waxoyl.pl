<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompleksowa Ochrona Samochodu - Ceramika i Antykorozja | Waxoyl Polska</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D60000; --primary-hover: #b30000; --dark: #111111; --darker: #0a0a0a; --light: #ffffff; --gray: #f5f5f5; --text: #333333; --text-light: #777777; --font: 'Montserrat', sans-serif; --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); color: var(--text); background-color: var(--light); line-height: 1.6; }
        h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; color: var(--dark); }
        .red-subtitle { color: var(--primary); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        section { padding: 100px 0; }
        .split-section { display: flex; align-items: center; gap: 60px; }
        .split-section > div { flex: 1; }
        .hero-img { width: 100%; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 16px 32px; font-weight: 700; text-transform: uppercase; text-decoration: none; border-radius: 4px; transition: var(--transition); border: 2px solid transparent; }
        .btn-primary { background-color: var(--primary); color: var(--light); }
        .btn-outline { background-color: transparent; border-color: var(--dark); color: var(--dark); }
        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        .bg-gray { background-color: var(--gray); }
        .bg-dark { background-color: var(--dark); color: var(--light); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .form-control { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        @media (max-width: 992px) { .split-section { flex-direction: column; } }
    </style>
</head>
<body>

    <section class="hero" id="home">
        <div class="container split-section">
            <div>
                <h1>Kompleksowa ochrona samochodu</h1>
                <p>Od ochrony lakieru po zabezpieczenie podwozia. Waxoyl zapewnia pełną ochronę.</p>
                <div class="btn-group">
                    <a href="#kontakt" class="btn btn-primary">Umów konsultację</a>
                </div>
            </div>
            <div>
                <img src="img/strona.png" alt="Waxoyl Polska" class="hero-img">
            </div>
        </div>
    </section>

    <section id="o-nas" class="bg-gray">
        <div class="container split-section">
            <div>
                <h2>Szwajcarska Precyzja</h2>
                <p>Ponad 85 lat doświadczenia w ochronie pojazdów.</p>
            </div>
            <div>
                <img src="https://via.placeholder.com/600x600" alt="Process" class="hero-img">
            </div>
        </div>
    </section>

    <section id="kontakt">
        <div class="container">
            <h2>Kontakt</h2>
            <div class="contact-grid">
                <div>
                    <p>📍 ul. Rzemieślnicza 35, 81-856 Sopot</p>
                    <p>📞 58 343 26 66</p>
                </div>
                <form>
                    <input type="text" class="form-control" placeholder="Imię">
                    <button type="submit" class="btn btn-primary">Wyślij</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>\
